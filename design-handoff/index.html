<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sawara Entreprise — Maquette</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body,#root{margin:0;padding:0;width:100%;height:100%;background:#f0eee9}
  .frame{
    width:100%;height:100%;border:0;display:block;background:#fff;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function Frame({ src }) {
    return <iframe src={src} className="frame" loading="lazy" />;
  }

  function App(){
    return (
      <DesignCanvas>
        <DCSection
          id="home"
          title="Sawara Entreprise — Page d'accueil"
          subtitle="Maquette premium · vert foncé / vert clair / blanc · formes arrondies"
        >
          <DCArtboard id="mobile" label="Mobile · 390 × 4400" width={390} height={4400}>
            <Frame src="home.html" />
          </DCArtboard>
          <DCArtboard id="desktop" label="Desktop · 1440 × 4400" width={1440} height={4400}>
            <Frame src="home.html" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
